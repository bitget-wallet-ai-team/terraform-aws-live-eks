name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'envs/**'
      - 'modules/**'
      - '.github/workflows/terraform-*.yml'

env:
  AWS_REGION: ap-northeast-1
  TF_IN_AUTOMATION: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.detect.outputs.stacks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Stacks
        id: detect
        run: |
          chmod +x scripts/detect_changed_stacks.sh
          STACKS=$(scripts/detect_changed_stacks.sh)
          echo "stacks=$STACKS" >> $GITHUB_OUTPUT
          echo "Detected stacks: $STACKS"

  plan:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.stacks != '[]' }}
    strategy:
      matrix:
        stack: ${{ fromJson(needs.detect-changes.outputs.stacks) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::151062088992:role/OpsPlanRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Format Check
        working-directory: ${{ matrix.stack }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ matrix.stack }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        working-directory: ${{ matrix.stack }}
        run: tflint --format compact

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ matrix.stack }}
          quiet: true
          soft_fail: true

      - name: Terraform Plan
        working-directory: ${{ matrix.stack }}
        run: |
          terraform plan -out=tfplan -detailed-exitcode || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "Plan failed"
            exit 1
          fi
          echo "PLAN_EXIT_CODE=${EXIT_CODE:-0}" >> $GITHUB_ENV

      - name: Generate Plan Summary
        working-directory: ${{ matrix.stack }}
        run: |
          terraform show -json tfplan > plan.json
          echo "### Terraform Plan for \`${{ matrix.stack }}\`" > plan.md
          echo "" >> plan.md
          echo "| Action | Count |" >> plan.md
          echo "|--------|-------|" >> plan.md
          
          ADD=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "create")] | length' plan.json 2>/dev/null || echo "0")
          CHANGE=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "update")] | length' plan.json 2>/dev/null || echo "0")
          DESTROY=$(jq -r '[.resource_changes[]?.change.actions[]? | select(. == "delete")] | length' plan.json 2>/dev/null || echo "0")
          
          echo "| 创建 (Create) | $ADD |" >> plan.md
          echo "| 更新 (Update) | $CHANGE |" >> plan.md
          echo "| 删除 (Delete) | $DESTROY |" >> plan.md
          
          cat plan.md

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.stack }}
          path: ${{ matrix.stack }}/tfplan
          retention-days: 5

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planMd = fs.readFileSync('${{ matrix.stack }}/plan.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: planMd
            });
